default_stages: [pre-commit]
exclude: ^(\.copier-answers\.yml)|.pixi$
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
    hooks:
      - id: check-builtin-literals
      - id: check-case-conflict
      - id: check-docstring-first
      - id: check-executables-have-shebangs
      - id: check-toml
      - id: check-json
      - id: detect-private-key
      - id: end-of-file-fixer
        exclude: \.min\.js$
      - id: trailing-whitespace
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: 77039ccbba72c8aede339c5f8ae29b42aced0a2e  # frozen: v0.15.18
    hooks:
      - id: ruff-format
      - id: ruff-check
  - repo: https://github.com/hoxbro/clean_notebook
    rev: 2e6f506fab3cdfbe16bc18fd0d24e828db773b74  # frozen: v0.2.1
    hooks:
      - id: clean-notebook
        args: [-i, tags]
  - repo: https://github.com/codespell-project/codespell
    rev: 2ccb47ff45ad361a21071a7eedda4c37e6ae8c5a  # frozen: v2.4.2
    hooks:
      - id: codespell
        additional_dependencies:
          - tomli
  - repo: https://github.com/hoxbro/prettier-pre-commit
    rev: df80de29d357cd4f5a116d1226eae3b8352271bd  # frozen: v3.8.4
    hooks:
      - id: prettier
        entry: prettier --write --ignore-unknown --no-error-on-unmatched-pattern
        types_or: [css]
  - repo: https://github.com/shssoichiro/oxipng
    rev: 628e241e23f368097883807fa6e985ccf7c00357  # frozen: v10.1.1
    hooks:
      - id: oxipng
        stages: [manual]
ci:
  autofix_prs: false
  autoupdate_schedule: quarterly
