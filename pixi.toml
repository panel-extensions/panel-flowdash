[workspace]
name = "panel-flowdash"
channels = ["conda-forge"]
platforms = ["osx-arm64", "linux-64", "win-64"]
preview = ["pixi-build"]
requires-pixi = ">=0.68.1"

[package]
name = "panel_flowdash"
version = "9999.0.0" # dynamic versioning: https://github.com/prefix-dev/pixi/issues/5360

[package.build]
backend = { name = "pixi-build-python", version = ">=0.4.4" }

[package.host-dependencies]
hatchling = "*"
hatch-vcs = "*"

[package.run-dependencies]
python = ">=3.10"
python-gil = '*'
panel = ">=1.9.0"
panel-material-ui = "*"

[dependencies]
panel_flowdash = { path = "." }

[pypi-dependencies]
# TODO: Add these to conda-forge / pyviz
panel_reactflow = "*"
panel_tiles = "*"

[feature.test.dependencies]
pytest = ">=6"
pytest-cov = "*"
mypy = "*"

[feature.test.tasks]
test = "pytest"
test-coverage = "pytest --cov=panel_flowdash --cov-report=xml --cov-report=term-missing"

[feature.build.dependencies]
python-build = "*"
twine = "*"
wheel = "*"

[feature.build.tasks]
build-wheel = "python -m build ."
check-wheel = "twine check dist/*"

[feature.lint.dependencies]
pre-commit = "*"

[feature.lint.tasks]
lint = "pre-commit run --all-files"
lint-install = "pre-commit install"

[feature.py310.dependencies]
python = "3.10.*"
[feature.py311.dependencies]
python = "3.11.*"
[feature.py312.dependencies]
python = "3.12.*"
[feature.py313.dependencies]
python = "3.13.*"
[feature.py314.dependencies]
python = "3.14.*"

[feature.test-ui]
channels = ["microsoft"]

[feature.test-ui.dependencies]
playwright = "*"
pytest-playwright = "*"
pytest-rerunfailures = "*"
pytest-xdist = "*"
jupyter_server = "*"
esbuild = "*"
packaging = "*"

[feature.test-ui.tasks]
_install-ui = 'playwright install chromium'

[feature.test-ui.tasks.test-ui]
cmd = 'pytest tests/ui --ui --browser chromium -n logical --dist loadgroup --reruns 3 --reruns-delay 10'
depends-on = ["_install-ui"]

[feature.docs.dependencies]
zensical = "*"
mkdocstrings-python = "*"

[feature.docs.tasks]
docs = "zensical serve"
docs-build = "zensical build"

[environments]
default = ["test"]
test-310 = ["py310", "test"]
test-311 = ["py311", "test"]
test-312 = ["py312", "test"]
test-313 = ["py313", "test"]
test-314 = ["py314", "test"]
test-ui = ["py312", "test", "test-ui"]
docs = ["docs"]
build = ["build"]
lint = { features = ["lint"], no-default-feature = true }
