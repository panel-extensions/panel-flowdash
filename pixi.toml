[workspace]
name = "panel-flowdash"
channels = ["conda-forge"]
platforms = ["osx-arm64", "linux-64", "win-64"]

[tasks]
install = "python -m pip install --no-deps --disable-pip-version-check -e ."

[dependencies]
python = ">=3.10"
pip = "*"
panel = ">=1.9.0"

[pypi-dependencies]
panel_reactflow = "*"
panel_tiles = "*"

[feature.test.dependencies]
pytest = ">=6"
pytest-cov = "*"
mypy = "*"

[feature.test.tasks]
test = "pytest"
test-coverage = "pytest --cov=panel_flowdash --cov-report=xml --cov-report=term-missing"

[feature.build.dependencies]
python-build = "*"
twine = "*"
wheel = "*"
[feature.build.tasks]
build-wheel = "python -m build --no-isolation ."
check-wheel = "twine check dist/*"

[feature.lint.dependencies]
pre-commit = "*"

[feature.lint.tasks]
lint = "pre-commit run --all-files"
lint-install = "pre-commit install"

[feature.py310.dependencies]
python = "3.10.*"
[feature.py311.dependencies]
python = "3.11.*"
[feature.py312.dependencies]
python = "3.12.*"

[feature.test-ui]
channels = ["microsoft"]

[feature.test-ui.dependencies]
playwright = { version = "*", channel = "microsoft" }
pytest-playwright = { version = "*", channel = "microsoft" }
pytest-asyncio = "*"
pytest-rerunfailures = "*"
pytest-xdist = "*"
jupyter_server = "*"
esbuild = "*"
packaging = "*"

[feature.test-ui.tasks]
_install-ui = 'playwright install chromium'

[feature.test-ui.tasks.test-ui]
cmd = 'pytest tests/ui --ui --browser chromium -n logical --dist loadgroup --reruns 3 --reruns-delay 10'
depends-on = ["_install-ui"]

[feature.docs.dependencies]
zensical = "*"
mkdocstrings-python = "*"

[feature.docs.tasks]
docs = "zensical serve"
docs-build = "zensical build"

[environments]
default = ["test"]
py310 = ["py310", "test"]
py311 = ["py311", "test"]
py312 = ["py312", "test"]
test-ui = ["py312", "test", "test-ui"]
docs = ["docs"]
build = ["build"]
lint = { features = ["lint"], no-default-feature = true }
